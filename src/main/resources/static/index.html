<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control Board - ECharts UI</title>
  <!-- Apache ECharts from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    #controls { padding: 12px; background: #f5f5f5; display:flex; gap:8px; align-items:center }
    #chart { height: 400px; }
    #db { padding: 12px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 6px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div id="controls">
    <span id="display">Count: 0</span>
    <button id="inc">Increment</button>
    <label>Led <input type="checkbox" id="led" /></label>
    <button id="refreshDb">Refresh DB</button>
  </div>

  <div id="chart"></div>

  <div id="db">
    <h3>Measurements</h3>
    <table id="measurements">
      <thead><tr><th>ID</th><th>Value</th><th>Timestamp</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const chartDom = document.getElementById('chart');
    const myChart = echarts.init(chartDom);
    const option = {
      title: { text: 'Counter History' },
      tooltip: { trigger: 'axis' },
      xAxis: { type: 'category', data: [] },
      yAxis: { type: 'value' },
      series: [{ name: 'Count', type: 'line', data: [] }]
    };
    myChart.setOption(option);

    async function fetchCounter() {
      const res = await fetch('/api/counter');
      return res.json();
    }

    async function fetchMeasurements() {
      const res = await fetch('/api/measurements');
      return res.json();
    }

    async function refreshUi() {
      const counter = await fetchCounter();
      document.getElementById('display').textContent = counter.display;
      document.getElementById('led').checked = counter.switchOn;

      const measurements = await fetchMeasurements();
      const series = measurements.map((m, idx) => m.value);
      const x = measurements.map((m, idx) => idx);
      myChart.setOption({ xAxis:{data:x}, series:[{data:series}] });

      const tbody = document.querySelector('#measurements tbody');
      tbody.innerHTML = '';
      for (const m of measurements) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${m.id}</td><td>${m.value}</td><td>${m.timestamp}</td>`;
        tbody.appendChild(tr);
      }
    }

    document.getElementById('inc').addEventListener('click', async () => {
      await fetch('/api/increment', { method: 'POST' });
      await refreshUi();
    });

    document.getElementById('led').addEventListener('change', async (e) => {
      await fetch('/api/switch?on=' + e.target.checked, { method: 'POST' });
    });

    document.getElementById('refreshDb').addEventListener('click', refreshUi);

    // Poll every second
    setInterval(refreshUi, 1000);
    refreshUi();
  </script>
</body>
</html>
